<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Alphabet — Spaced Repetition Exercises</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --navy: oklch(0.22 0.04 250);
    --navy-mid: oklch(0.32 0.04 250);
    --navy-light: oklch(0.40 0.05 250);
    --warm: oklch(0.95 0.01 80);
    --warm-deep: oklch(0.92 0.015 80);
    --paper: oklch(0.98 0.005 90);
    --gold: oklch(0.62 0.13 80);
    --gold-muted: oklch(0.68 0.10 80);
    --terra: oklch(0.52 0.17 30);
    --terra-light: oklch(0.60 0.15 30);
    --ink: oklch(0.20 0 0);
    --ink-70: oklch(0.38 0 0);
    --ink-50: oklch(0.48 0 0);
    --ink-40: oklch(0.55 0 0);
    --ink-20: oklch(0.72 0 0);
    --ink-08: oklch(0.90 0.003 90);
    --ink-04: oklch(0.94 0.003 90);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-top: 0;
  }

  /* ═══════════════════════════════
     CONTROLS (inline within cover)
     ═══════════════════════════════ */
  .controls-inline {
    max-width: 460px;
    width: 100%;
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--ink-08);
  }

  .controls-slider-area {
    margin-bottom: 1.2rem;
  }

  .controls-slider-area label {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--ink-70);
    margin-bottom: 0.6rem;
    text-align: center;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .slider-end {
    font-size: 0.6rem;
    font-weight: 400;
    color: var(--ink-50);
    white-space: nowrap;
  }

  .controls-slider-area input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 20px;
    background: transparent;
    outline: none;
    cursor: pointer;
    margin: 0;
    padding: 0;
  }

  .controls-slider-area input[type="range"]::-webkit-slider-runnable-track {
    height: 2px;
    background: var(--ink-08);
    border-radius: 2px;
  }

  .controls-slider-area input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 1px var(--ink-08);
    cursor: pointer;
    margin-top: -6px;
  }

  .controls-actions {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
  }

  .controls-actions .ctrl-btn {
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 0.4rem 1.1rem;
    border: 1px solid var(--ink-08);
    border-radius: 3px;
    background: transparent;
    color: var(--ink-70);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .controls-actions .ctrl-btn:hover {
    border-color: var(--ink-40);
    color: var(--ink);
  }

  .controls-actions .ctrl-btn.primary {
    border-color: var(--gold-muted);
    color: var(--gold);
  }

  .controls-actions .ctrl-btn.primary:hover {
    background: oklch(0.62 0.13 80 / 0.08);
  }

  @media print { .controls-inline { display: none; } }

  /* ═══════════════════════════════
     COVER
     ═══════════════════════════════ */
  .cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    page-break-after: always;
    position: relative;
    background: var(--paper);
  }

  /* Geometric accent — 8-pointed Islamic star */
  .cover-geo {
    width: 52px;
    height: 52px;
    margin-bottom: 2.5rem;
    opacity: 0.3;
  }

  .cover-geo svg {
    width: 100%;
    height: 100%;
  }

  .cover-rule {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 1rem auto 1rem;
  }

  .cover-title-en {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--navy-light);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .cover-subtitle {
    font-size: 0.78rem;
    color: var(--ink-70);
    font-weight: 300;
    margin-bottom: 3.5rem;
  }

  /* (alphabet listing removed from cover) */

  .cover-instructions {
    max-width: 460px;
    width: 100%;
  }

  .cover-instructions h3 {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-70);
    margin-bottom: 0.75rem;
    text-align: center;
  }

  .cover-instructions ul {
    list-style: none;
    font-size: 0.78rem;
    color: var(--ink-70);
    font-weight: 300;
    line-height: 1.8;
  }

  .cover-instructions li {
    padding-left: 1rem;
    position: relative;
  }

  .cover-instructions li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.65em;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
  }

  /* ═══════════════════════════════
     LETTER PAGES
     ═══════════════════════════════ */
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2rem;
    page-break-after: always;
  }

  .letter-group {
    position: relative;
  }

  /* ── Letter hero ── */
  .letter-hero {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  @keyframes letter-speak {
    0%   { transform: scale(1);    color: var(--navy); }
    20%  { transform: scale(1.12); color: var(--gold); }
    100% { transform: scale(1);    color: var(--navy); }
  }

  @keyframes cell-speak {
    0%   { transform: scale(1);    color: var(--navy); }
    20%  { transform: scale(1.18); color: var(--gold); }
    100% { transform: scale(1);    color: var(--navy); }
  }

  .letter-display {
    font-family: 'Amiri', serif;
    font-size: 5.5rem;
    font-weight: 700;
    color: var(--navy);
    direction: rtl;
    line-height: 1;
    flex-shrink: 0;
    position: relative;
    width: 5rem;
    text-align: center;
    cursor: pointer;
  }

  .letter-display:hover {
    opacity: 0.8;
  }

  .letter-display.speaking {
    animation: letter-speak 0.45s ease-out;
  }

  .letter-display::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 2px;
    background: var(--gold);
  }

  .letter-info {
    padding-top: 0.6rem;
  }

  .letter-num {
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-50);
    margin-bottom: 0.15rem;
  }

  .letter-name {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    color: var(--navy);
    font-weight: 400;
    margin-bottom: 0.3rem;
  }

  .letter-pool {
    direction: rtl;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: baseline;
  }

  .letter-pool span {
    font-family: 'Amiri', serif;
    font-size: 1rem;
    color: var(--ink-20);
    /* Force isolated form — prevent Arabic ligature joining */
    unicode-bidi: bidi-override;
    direction: rtl;
  }

  /* ── Sub-levels ── */
  .sublevels {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .sublevel {
    /* intentionally minimal container */
  }

  .sublevel-tag {
    display: inline-block;
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-50);
    margin-bottom: 0.5rem;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid var(--ink-08);
  }

  /* ── Exercise rows ── */
  .rows {
    display: flex;
    flex-direction: column;
  }

  .row {
    display: flex;
    align-items: center;
    direction: rtl;
    padding: 0.45rem 0;
    border-bottom: 1px solid var(--ink-04);
  }

  .row:last-child {
    border-bottom: none;
  }

  .row-num {
    font-size: 0.5rem;
    font-weight: 500;
    color: var(--ink-20);
    width: 1rem;
    text-align: center;
    direction: ltr;
    margin-left: 0.25rem;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .row-letters {
    display: flex;
    direction: rtl;
    flex: 1;
    justify-content: center;
    gap: 0.25rem;
  }

  .cell {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    width: 3.2rem;
    text-align: center;
    line-height: 1.5;
    color: var(--navy);
    transition: color 0.1s;
    cursor: pointer;
  }

  .cell.speaking {
    animation: cell-speak 0.35s ease-out;
  }

  .cell.new {
    color: var(--terra);
  }

  /* ═══════════════════════════════
     REFERENCE
     ═══════════════════════════════ */
  .reference {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2rem;
    page-break-before: always;
  }

  .reference h2 {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    font-weight: 400;
    text-align: center;
    color: var(--navy);
    margin-bottom: 0.25rem;
  }

  .reference-sub {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--ink-20);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .ref-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.35rem;
    direction: rtl;
  }

  .ref-card {
    text-align: center;
    padding: 0.6rem 0.2rem;
    border: 1px solid var(--ink-08);
    border-radius: 2px;
    background: white;
    cursor: pointer;
  }

  .ref-card.speaking {
    animation: cell-speak 0.35s ease-out;
  }

  .ref-card-num {
    font-size: 0.45rem;
    font-weight: 600;
    color: var(--ink-20);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .ref-card-letter {
    font-family: 'Amiri', serif;
    font-size: 2.2rem;
    color: var(--navy);
    line-height: 1.3;
  }

  .ref-card-name {
    font-size: 0.58rem;
    color: var(--ink-50);
    font-weight: 300;
  }

  /* ═══════════════════════════════
     PRINT VIEW (condensed)
     ═══════════════════════════════ */
  #print-view { display: none; }

  .pv {
    max-width: 700px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
  }

  .pv-title {
    text-align: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #ccc;
  }

  .pv-title-ar {
    font-family: 'Amiri', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: #111;
    direction: rtl;
  }

  .pv-title-en {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #999;
    margin-top: 0.15rem;
  }

  .pv-letter {
    page-break-inside: avoid;
    margin-bottom: 1.2rem;
  }

  .pv-letter-head {
    text-align: center;
    margin-bottom: 0.25rem;
  }

  .pv-letter-glyph {
    font-family: 'Amiri', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: #111;
    direction: rtl;
  }

  .pv-letter-name {
    font-size: 0.55rem;
    color: #999;
    letter-spacing: 0.05em;
  }

  .pv-sub {
    direction: rtl;
    text-align: center;
    padding: 0.3rem 0;
    border-bottom: 1px solid #ddd;
    font-family: 'Amiri', serif;
    font-size: 1.25rem;
    line-height: 1.6;
    color: #222;
    word-spacing: 0.1em;
  }

  .pv-sub:last-child { border-bottom: none; }

  .pv-sep {
    color: #ccc;
    margin: 0 0.15em;
    font-weight: 300;
  }

  .pv-new {
    color: #b5432a;
    font-weight: 700;
  }

  @media print {
    body { background: white; padding: 0; }
    #app { display: none; }
    .toolbar { display: none; }
    #print-view { display: block; }
  }

  @media screen {
    .print-mode #app { display: none; }
    .print-mode #print-view { display: block; }
  }
</style>

<body>

<!-- toolbar removed — controls are now inline after the cover -->

<div id="app"></div>
<div id="print-view"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// METHODOLOGICAL ENGINE v2
// ═══════════════════════════════════════════════════════════════
//
// STRUCTURE:
//   Each of the 28 letters gets 3 sub-levels:
//     Sub-level 1: chunk size 2 (easy pairs — low cognitive load, first exposure)
//     Sub-level 2: chunk size 3 (medium — more distractors per row)
//     Sub-level 3: chunk size 4 (hardest for this letter — max discrimination)
//   Each sub-level has 5 exercises (rows).
//   Total: 28 letters * 3 sub-levels * 5 rows = 420 rows.
//
// CORE PRINCIPLES:
//   1. Active recall: student identifies each letter, not passively sees it
//   2. Spaced repetition with recency weighting: review letters weighted by
//      how recently they were learned
//   3. Incremental difficulty: chunk size 2->3->4 within each letter
//   4. No isolated introduction: new letter always mixed with known letters
//
// ═══════════════════════════════════════════════════════════════

const ALPHABET = [
  "ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","و","هـ","ي","ء"
];

const LETTER_NAMES = [
  "Alif","Baa","Taa","Thaa","Jiim","Haa","Khaa","Daal","Dhaal","Raa","Zaay",
  "Siin","Shiin","Saad","Daad","Taa'","Dhaa'","'Ayn","Ghayn","Faa","Qaaf",
  "Kaaf","Laam","Miim","Nuun","Waaw","Haa'","Yaa","Hamza"
];

const AUDIO_FILES = {
  "ا": "alif.mp3",
  "ب": "baa.mp3",
  "ت": "taa.mp3",
  "ث": "thaa.mp3",
  "ج": "jiim.mp3",
  "ح": "haa.mp3",
  "خ": "khaa.mp3",
  "د": "daal.mp3",
  "ذ": "dhaal.mp3",
  "ر": "raa.mp3",
  "ز": "zaay.mp3",
  "س": "siin.mp3",
  "ش": "shiin.mp3",
  "ص": "saad.mp3",
  "ض": "daad.mp3",
  "ط": "taa2.mp3",
  "ظ": "dhaa2.mp3",
  "ع": "ayn.mp3",
  "غ": "ghayn.mp3",
  "ف": "faa.mp3",
  "ق": "qaaf.mp3",
  "ك": "kaaf.mp3",
  "ل": "laam.mp3",
  "م": "miim.mp3",
  "ن": "nuun.mp3",
  "و": "waaw.mp3",
  "هـ": "haa2.mp3",
  "ي": "yaa.mp3",
  "ء": "hamza.mp3",
  "أ": "hamza.mp3",
  "ؤ": "hamza.mp3",
  "ئ": "hamza.mp3"
};

const HAMZA_VARIANTS = ["ء", "أ", "ؤ", "ئ"];

const audioCache = {};
function playLetter(letter, el) {
  if (!AUDIO_FILES[letter]) return;
  if (!audioCache[letter]) {
    audioCache[letter] = new Audio('audio/' + AUDIO_FILES[letter]);
  }
  const a = audioCache[letter];
  a.currentTime = 0;
  a.play();
  if (el) {
    el.classList.remove('speaking');
    void el.offsetWidth;
    el.classList.add('speaking');
    el.addEventListener('animationend', () => el.classList.remove('speaking'), { once: true });
  }
}

const CHUNK_SIZES = [2, 3, 4];
const NUM_EXERCISES = 5;

// ── PRNG ──
function seededRandom(seed) {
  let t = seed + 0x6D2B79F5;
  return function() {
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function shuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function weightedSample(items, weights, count, rng) {
  const result = [];
  const avail = items.map((item, i) => ({ item, weight: weights[i] }));
  for (let n = 0; n < count && avail.length > 0; n++) {
    const total = avail.reduce((s, a) => s + a.weight, 0);
    let r = rng() * total;
    let picked = avail.length - 1;
    for (let i = 0; i < avail.length; i++) {
      r -= avail[i].weight;
      if (r <= 0) { picked = i; break; }
    }
    result.push(avail[picked].item);
    avail.splice(picked, 1);
  }
  return result;
}

// ── Recency bias (slider-controlled) ──
let recencyBias = 0.5;

function recencyWeights(reviewLetters) {
  if (reviewLetters.length === 0) return [];
  if (reviewLetters.length === 1) return [1];
  const floor = 1.0 - recencyBias * 0.98;
  const exp = 1 + recencyBias * 2;
  return reviewLetters.map((_, i) => {
    const t = i / (reviewLetters.length - 1);
    return floor + (1 - floor) * Math.pow(t, exp);
  });
}

// ── Unique permutations of a multiset ──
function uniquePermutations(items) {
  const results = [];
  const sorted = [...items].sort();
  function permute(cur, rem) {
    if (rem.length === 0) { results.push([...cur]); return; }
    let prev = null;
    for (let i = 0; i < rem.length; i++) {
      if (rem[i] === prev) continue;
      prev = rem[i];
      cur.push(rem[i]);
      permute(cur, [...rem.slice(0, i), ...rem.slice(i + 1)]);
      cur.pop();
    }
  }
  permute([], sorted);
  return results;
}

// ── Candidate composition ──
function candidateComposition(newLetter, reviewLetters, weights, reviewSlots, rng, seen, exIdx) {
  if (reviewLetters.length === 0) return [newLetter];

  if (reviewLetters.length < reviewSlots) {
    const fill = [newLetter, ...reviewLetters];
    const rem = reviewSlots - reviewLetters.length;
    for (let i = 0; i < rem; i++) fill.push(reviewLetters[i % reviewLetters.length]);
    reviewLetters.forEach(l => seen.add(l));
    return fill;
  }

  let picks;
  const unseen = reviewLetters.filter(l => !seen.has(l));

  if (exIdx >= NUM_EXERCISES - 2 && unseen.length > 0) {
    const fc = Math.min(reviewSlots, unseen.length);
    const forced = shuffle(unseen, rng).slice(0, fc);
    forced.forEach(l => seen.add(l));
    if (fc < reviewSlots) {
      const rest = reviewLetters.filter(l => !forced.includes(l));
      const rw = recencyWeights(rest);
      picks = [...forced, ...weightedSample(rest, rw, reviewSlots - fc, rng)];
    } else { picks = forced; }
  } else {
    picks = weightedSample(reviewLetters, weights, reviewSlots, rng);
    picks.forEach(l => seen.add(l));
  }

  return [newLetter, ...picks];
}

// ── Generate one sub-level with uniqueness ──
function generateSubLevel(letterIdx, chunkSize, rng) {
  const newLetter = ALPHABET[letterIdx];
  const available = ALPHABET.slice(0, letterIdx + 1);
  const review = available.filter(l => l !== newLetter);
  const weights = recencyWeights(review);
  const rSlots = chunkSize - 1;
  const poolTiny = review.length < chunkSize;

  if (poolTiny) {
    const comp = candidateComposition(newLetter, review, weights, rSlots, rng, new Set(), 0);
    const allPerms = uniquePermutations(comp);
    let valid = allPerms;
    const distinct = new Set(comp).size;
    if (chunkSize > 2 && distinct === chunkSize) {
      valid = allPerms.filter(p => {
        const ix = p.map(l => ALPHABET.indexOf(l));
        const asc = ix.every((v, i, a) => i === 0 || v >= a[i-1]);
        const dsc = ix.every((v, i, a) => i === 0 || v <= a[i-1]);
        return !asc && !dsc;
      });
      if (valid.length === 0) valid = allPerms;
    }
    const sh = shuffle(valid, rng);
    return Array.from({ length: NUM_EXERCISES }, (_, i) => [...sh[i % sh.length]]);
  }

  // ── Position schedule: new letter visits every slot across 5 rows ──
  const posSchedule = [];
  for (let i = 0; i < NUM_EXERCISES; i++) posSchedule.push(i % chunkSize);
  // Shuffle the schedule so order is random
  for (let i = posSchedule.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [posSchedule[i], posSchedule[j]] = [posSchedule[j], posSchedule[i]];
  }

  // ── For pairs: pick unique review letters when pool is large enough ──
  let pairReviewPicks = null;
  if (chunkSize === 2) {
    if (review.length >= NUM_EXERCISES) {
      pairReviewPicks = weightedSample(review, weights, NUM_EXERCISES, rng);
    } else {
      // Pick all unique, then cycle to fill
      const unique = weightedSample(review, weights, review.length, rng);
      pairReviewPicks = [];
      for (let i = 0; i < NUM_EXERCISES; i++) pairReviewPicks.push(unique[i % unique.length]);
      // Shuffle so the cycling isn't obvious
      for (let i = pairReviewPicks.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [pairReviewPicks[i], pairReviewPicks[j]] = [pairReviewPicks[j], pairReviewPicks[i]];
      }
    }
  }

  const chunks = [];
  const seenKeys = new Set();
  const seenReview = new Set();

  for (let ex = 0; ex < NUM_EXERCISES; ex++) {
    const newPos = posSchedule[ex];
    let best = null;

    for (let att = 0; att < 80; att++) {
      // Pick review letters for this row
      let picks;
      if (pairReviewPicks) {
        picks = [pairReviewPicks[ex]];
      } else {
        picks = candidateComposition(newLetter, review, weights, rSlots, rng, seenReview, ex);
        // candidateComposition returns [newLetter, ...reviewPicks], extract just review
        picks = picks.filter(l => l !== newLetter);
        // If we got fewer review picks than needed (shouldn't happen in large pool), pad
        while (picks.length < rSlots) picks.push(review[Math.floor(rng() * review.length)]);
      }

      // Place new letter at scheduled position, fill others with review picks
      const cand = new Array(chunkSize);
      cand[newPos] = newLetter;
      let pi = 0;
      for (let s = 0; s < chunkSize; s++) {
        if (s === newPos) continue;
        cand[s] = picks[pi++];
      }

      // For triples/quads, reject sorted runs
      const dist = new Set(cand).size;
      if (chunkSize > 2 && dist === chunkSize) {
        const ix = cand.map(l => ALPHABET.indexOf(l));
        if (ix.every((v, i, a) => i === 0 || v >= a[i-1]) ||
            ix.every((v, i, a) => i === 0 || v <= a[i-1])) continue;
      }

      const key = cand.join(',');
      if (!seenKeys.has(key)) { seenKeys.add(key); best = cand; break; }
      best = cand;
    }

    if (!best) {
      // Fallback: just place new letter at scheduled position with random review
      const fb = new Array(chunkSize);
      fb[newPos] = newLetter;
      const fbPicks = pairReviewPicks ? [pairReviewPicks[ex]]
        : weightedSample(review, weights, rSlots, rng);
      let pi = 0;
      for (let s = 0; s < chunkSize; s++) {
        if (s === newPos) continue;
        fb[s] = fbPicks[pi++];
      }
      best = fb;
    }
    chunks.push(best);
  }
  return chunks;
}

function applyHamzaVariants(subs, rng) {
  // Collect all rows across sub-levels, assign variants ensuring all 4 appear
  const variants = shuffle([...HAMZA_VARIANTS], rng);
  let vi = 0;
  subs.forEach(s => {
    s.chunks.forEach(chunk => {
      const variant = variants[vi % variants.length];
      vi++;
      for (let c = 0; c < chunk.length; c++) {
        if (chunk[c] === "ء") chunk[c] = variant;
      }
    });
  });
}

function generateAllData(seed) {
  const rng = seededRandom(seed ?? 42);
  const letters = [];
  for (let i = 1; i < ALPHABET.length; i++) {
    const subs = CHUNK_SIZES.filter(cs => i + 1 >= cs).map(cs => ({ size: cs, chunks: generateSubLevel(i, cs, rng) }));
    if (ALPHABET[i] === "ء") applyHamzaVariants(subs, rng);
    letters.push({
      idx: i,
      letter: ALPHABET[i],
      name: LETTER_NAMES[i],
      pool: ALPHABET.slice(0, i + 1),
      subs
    });
  }
  return letters;
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

const SUB_NAMES = ['Level 1', 'Level 2', 'Level 3'];

function renderCover() {
  return `
    <div class="cover">
      <div class="cover-geo"><svg viewBox="0 0 100 100"><polygon points="50,2 61,22 84,16 78,39 98,50 78,61 84,84 61,78 50,98 39,78 16,84 22,61 2,50 22,39 16,16 39,22" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="50" cy="50" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></div>
      <div class="cover-rule"></div>
      <div class="cover-title-en">The Arabic Alphabet</div>
      <div class="cover-subtitle">A Spaced Repetition Exercise Book</div>
      <div class="cover-instructions">
        <h3>How to Use</h3>
        <ul>
          <li>Each letter has three stages: pairs, triples, then quads.</li>
          <li>The new letter is mixed with previously learned letters — no colour hint.</li>
          <li>Read each row aloud, right to left, naming every letter.</li>
          <li>Recently learned letters appear more often; older letters still surface to prevent forgetting. Adjust this balance with the slider below.</li>
          <li>Go at the learner's pace. Repeat any stage before moving on.</li>
        </ul>
      </div>
      <div class="controls-inline no-print">
        <div class="controls-slider-area">
          <label>How often should older letters reappear?</label>
          <div class="slider-row">
            <span class="slider-end">all equally</span>
            <input type="range" id="recency-slider" min="0" max="100" value="${Math.round(recencyBias * 100)}"
                   onchange="updateRecency(this.value)">
            <span class="slider-end">focus on recent</span>
          </div>
        </div>
        <div class="controls-actions">
          <button class="ctrl-btn" onclick="regenerate()">Regenerate</button>
          <button class="ctrl-btn primary" onclick="exportPDF()">Export PDF</button>
        </div>
      </div>
    </div>`;
}

function renderLetter(d, num) {
  const pool = d.pool.slice().reverse().map(l =>
    `<span>\u2068${l}\u2069</span>`
  ).join('');

  const subs = d.subs.map((s, si) => {
    const rows = s.chunks.map((chunk, ri) => {
      const cells = chunk.map(l =>
        `<span class="cell" onclick="playLetter('${l}',this)">${l}</span>`
      ).join('');
      return `<div class="row"><div class="row-letters">${cells}</div><div class="row-num">${ri + 1}</div></div>`;
    }).join('');

    return `
      <div class="sublevel">
        <div class="sublevel-tag">${SUB_NAMES[si]}</div>
        <div class="rows">${rows}</div>
      </div>`;
  }).join('');

  return `
    <div class="letter-group">
      <div class="letter-hero">
        <div class="letter-display" onclick="playLetter('${d.letter}',this)">${d.letter}</div>
        <div class="letter-info">
          <div class="letter-num">Letter ${num} of 28</div>
          <div class="letter-name">${d.name}</div>
          <div class="letter-pool">${pool}</div>
        </div>
      </div>
      <div class="sublevels">${subs}</div>
    </div>`;
}

function renderReference() {
  const cards = ALPHABET.map((l, i) => `
    <div class="ref-card" onclick="playLetter('${l}',this)" style="cursor:pointer">
      <div class="ref-card-num">${i === 0 ? 'base' : i}</div>
      <div class="ref-card-letter">${l}</div>
      <div class="ref-card-name">${LETTER_NAMES[i]}</div>
    </div>`).join('');

  return `
    <div class="reference">
      <h2>Reference</h2>
      <p class="reference-sub">Traditional order, right to left</p>
      <div class="ref-grid">${cards}</div>
    </div>`;
}

function renderLetters(seed) {
  const data = generateAllData(seed);
  let html = '';
  data.forEach((d, i) => {
    html += `<div class="page">${renderLetter(d, i + 1)}</div>`;
  });
  html += renderReference();
  document.getElementById('letters').innerHTML = html;
  renderPrintView(data);
}

function render(seed) {
  document.getElementById('app').innerHTML =
    renderCover() + '<div id="letters"></div>';
  renderLetters(seed);
}

function renderPrintView(data) {
  let html = `<div class="pv">
    <div class="pv-title">
      <div class="pv-title-ar">الحروف العربيّة</div>
      <div class="pv-title-en">Spaced Repetition Exercises</div>
    </div>`;

  data.forEach(d => {
    html += `<div class="pv-letter">
      <div class="pv-letter-head">
        <span class="pv-letter-glyph">${d.letter}</span>
        <span class="pv-letter-name"> ${d.name}</span>
      </div>`;

    d.subs.forEach(s => {
      // Each sub-level: all 5 chunks on one line, separated by |
      const chunks = s.chunks.map(chunk => {
        return chunk.map(l =>
          l
        ).join('\u2009'); // thin space between letters in a chunk
      }).join('<span class="pv-sep">\u2009|\u2009</span>');

      html += `<div class="pv-sub">${chunks}</div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('print-view').innerHTML = html;
}

let currentSeed = 42;

function updateRecency(val) {
  recencyBias = val / 100;
  renderLetters(currentSeed);
}

function regenerate() {
  currentSeed = Math.floor(Math.random() * 100000);
  renderLetters(currentSeed);
}

function exportPDF() {
  window.print();
}

document.addEventListener('DOMContentLoaded', () => render(currentSeed));
</script>

</body>
</html>
